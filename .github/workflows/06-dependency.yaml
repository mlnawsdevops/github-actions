name: 06-dependency
on: [push]
jobs:
  # job-1 and job-2 are parallel, no dependency. job-2 and job-3 are dependent
  job-1:
    runs-on: ubuntu-latest
    steps:
      - name: step-1
        run: echo "Hi, Iam from job-1"
  
  job-2:
    needs: job-1
    runs-on: ubuntu-latest
    steps:
      - name: step-1
        run: echo "Hi, Iam from job-2"
  
  job-3:
    needs: job-2
    runs-on: ubuntu-latest
    steps:
      - name: step-1
        run: echo "Hi, Iam from job-3"

  job-4:
    runs-on: ubuntu-latest
    steps:
      - name: step-1
        run: echo "Hi, Iam from job-4" 
